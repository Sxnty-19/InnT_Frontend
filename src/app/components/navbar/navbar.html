<nav class="navbar">

    <div class="nav-left clickable" (click)="irPrincipal()" role="button" tabindex="0"
        (keydown)="handleKeyDown($event)">
        <img src="Logo_SS.jpeg" alt="Logo Hotel" class="logo" />
        <h1 class="brand">Hotel Santandereano Del Sur</h1>
    </div>

    <div class="nav-right">

        <div class="user-info" *ngIf="fullName">
            <div class="user-avatar">{{ fullName.charAt(0).toUpperCase() }}</div>
            <span class="user-name desktop-only">{{ fullName }}</span>
        </div>

        <div class="nav-divider desktop-only"></div>

        <button class="nav-btn" (click)="editarPerfil()" title="Editar perfil">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <span class="desktop-text">Editar perfil</span>
        </button>

        <button class="nav-btn logout" (click)="cerrarSesion()" title="Cerrar sesión">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            <span class="desktop-text">Cerrar sesión</span>
        </button>

    </div>
</nav>
